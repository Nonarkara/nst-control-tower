<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 616" role="img" font-family="'Noto Sans Thai','Sarabun','Tahoma',sans-serif">
  <title>ของจริง ไม่ใช่สไลด์ — หลักฐานเป็นตัวเลขจากระบบที่รันจริง</title>
  <desc>Infographic with six stat cards showing proof points: 15,148 buildings, 47 data sources, live feeds, 521 passing tests, 3 mobile screens, and open source code. All numbers come from running code.</desc>

  <rect width="1200" height="600" fill="#FAF8F1"/>

  <!-- Title block -->
  <text x="56" y="64" font-size="38" font-weight="800" fill="#2C2418">ของจริง ไม่ใช่สไลด์</text>
  <text x="58" y="96" font-size="19" fill="#9A8F80" font-family="'Inter',sans-serif">Proof — real, running, tested.</text>
  <rect x="58" y="110" width="120" height="7" rx="3.5" fill="#F1BE48"/>

  <!-- ============ ROW 1 ============ -->

  <!-- Card 1 — buildings (amber) -->
  <rect x="56" y="156" width="346" height="186" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="56" y="156" width="346" height="6" rx="3" fill="#D6A12A"/>
  <g transform="translate(88,196)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#FBEFCB"/>
    <g stroke="#D6A12A" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <rect x="11" y="13" width="11" height="17" rx="1.5" fill="#F2DFA6"/>
      <path d="M22 16 L30 11 L30 30 L22 30"/>
      <path d="M14.5 18 H18.5 M14.5 22 H18.5 M14.5 26 H18.5"/>
    </g>
  </g>
  <text x="88" y="278" font-size="52" font-weight="800" fill="#D6A12A" font-family="'Inter',sans-serif">15,148</text>
  <text x="88" y="306" font-size="20" font-weight="800" fill="#2C2418">อาคาร · แตะได้ทุกหลัง</text>
  <text x="88" y="328" font-size="12.5" fill="#9A8F80" font-family="'Inter',sans-serif">Every building is tappable on the map</text>

  <!-- Card 2 — sources (teal) -->
  <rect x="427" y="156" width="346" height="186" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="427" y="156" width="346" height="6" rx="3" fill="#4A773C"/>
  <g transform="translate(459,196)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#E3EDDA"/>
    <g stroke="#4A773C" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <ellipse cx="20" cy="13" rx="9" ry="3.6" fill="#C2D4B0"/>
      <path d="M11 13 V27 C11 29 15.5 30.6 20 30.6 C24.5 30.6 29 29 29 27 V13"/>
      <path d="M11 20 C11 22 15.5 23.6 20 23.6 C24.5 23.6 29 22 29 20"/>
    </g>
  </g>
  <text x="459" y="278" font-size="52" font-weight="800" fill="#4A773C" font-family="'Inter',sans-serif">47</text>
  <text x="459" y="306" font-size="20" font-weight="800" fill="#2C2418">แหล่งข้อมูล · ต่อจริง</text>
  <text x="459" y="328" font-size="12.5" fill="#9A8F80" font-family="'Inter',sans-serif">Live data sources, actually connected</text>

  <!-- Card 3 — live (green) -->
  <rect x="798" y="156" width="346" height="186" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="798" y="156" width="346" height="6" rx="3" fill="#7E8A3A"/>
  <g transform="translate(830,196)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#EDF0DC"/>
    <g stroke="#7E8A3A" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <path d="M11 23 C11 23 11 14 20 14 C29 14 29 23 29 23"/>
      <path d="M15 26 C15 26 15 20 20 20 C25 20 25 26 25 26"/>
      <circle cx="20" cy="28.5" r="2.4" fill="#7E8A3A" stroke="none"/>
    </g>
  </g>
  <g transform="translate(830,238)">
    <text x="0" y="40" font-size="52" font-weight="800" fill="#7E8A3A" font-family="'Inter',sans-serif">LIVE</text>
    <circle cx="146" cy="22" r="6.5" fill="#7E8A3A"/>
    <circle cx="146" cy="22" r="11" fill="none" stroke="#7E8A3A" stroke-width="2" opacity="0.45"/>
  </g>
  <text x="830" y="306" font-size="20" font-weight="800" fill="#2C2418">ฟีดสด · รีเฟรชเอง</text>
  <text x="830" y="328" font-size="12.5" fill="#9A8F80" font-family="'Inter',sans-serif">Feeds refresh on their own schedule</text>

  <!-- ============ ROW 2 ============ -->

  <!-- Card 4 — tests (blue) -->
  <rect x="56" y="368" width="346" height="186" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="56" y="368" width="346" height="6" rx="3" fill="#6E4A33"/>
  <g transform="translate(88,408)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#EBE2D9"/>
    <g stroke="#6E4A33" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <circle cx="20" cy="20" r="9" fill="#D8C7B5"/>
      <path d="M15.5 20 L18.5 23 L24.5 16.5"/>
    </g>
  </g>
  <text x="88" y="490" font-size="52" font-weight="800" fill="#6E4A33" font-family="'Inter',sans-serif">521</text>
  <text x="88" y="518" font-size="20" font-weight="800" fill="#2C2418">การทดสอบผ่าน · กันพัง</text>
  <text x="88" y="540" font-size="12.5" fill="#9A8F80" font-family="'Inter',sans-serif">Passing tests guard against breakage</text>

  <!-- Card 5 — mobile screens (red) -->
  <rect x="427" y="368" width="346" height="186" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="427" y="368" width="346" height="6" rx="3" fill="#B14A2B"/>
  <g transform="translate(459,408)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#F3E0D7"/>
    <g stroke="#B14A2B" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <rect x="13.5" y="10" width="13" height="20" rx="2.5" fill="#E9C8B8"/>
      <line x1="13.5" y1="25" x2="26.5" y2="25"/>
      <circle cx="20" cy="27.5" r="1" fill="#B14A2B" stroke="none"/>
    </g>
  </g>
  <text x="459" y="490" font-size="52" font-weight="800" fill="#B14A2B" font-family="'Inter',sans-serif">3</text>
  <text x="459" y="518" font-size="20" font-weight="800" fill="#2C2418">หน้าจอมือถือ · แผนที่/สรุป/ชั้นข้อมูล</text>
  <text x="459" y="540" font-size="12.5" fill="#9A8F80" font-family="'Inter',sans-serif">Map · Summary · Layers — built for phones</text>

  <!-- Card 6 — open source (violet) -->
  <rect x="798" y="368" width="346" height="186" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="798" y="368" width="346" height="6" rx="3" fill="#2F6B5A"/>
  <g transform="translate(830,408)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#DCE8E2"/>
    <g stroke="#2F6B5A" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <rect x="11" y="20" width="18" height="11" rx="2" fill="#C2D6CD"/>
      <path d="M15 20 V16 C15 12.5 17.5 10.5 20.5 10.5 C23 10.5 24.8 12 25.3 14"/>
      <circle cx="20" cy="25.5" r="1.6" fill="#2F6B5A" stroke="none"/>
    </g>
  </g>
  <text x="830" y="488" font-size="44" font-weight="800" fill="#2F6B5A" font-family="'Inter',sans-serif">Open Source</text>
  <text x="830" y="518" font-size="20" font-weight="800" fill="#2C2418">โค้ดเปิด · ตรวจสอบได้</text>
  <text x="830" y="540" font-size="12.5" fill="#9A8F80" font-family="'Inter',sans-serif">Open code — anyone can audit it</text>

  <!-- Bottom promise pill -->
  <rect x="56" y="572" width="1088" height="34" rx="17" fill="#241B11"/>
  <text x="600" y="595" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">ทุกตัวเลขมาจากโค้ดจริงที่รันอยู่</text>
</svg>
