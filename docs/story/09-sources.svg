    <text x="52" y="42" font-size="12.5" fill="#9A8F80">Weather &amp; air quality</text>
  </g>
  <!-- chips -->
  <g transform="translate(84,256)">
    <rect x="0" y="0" width="132" height="34" rx="17" fill="#EEF3E6" stroke="#E3EDDA" stroke-width="1.5"/>
    <text x="66" y="22" text-anchor="middle" font-size="14.5" font-weight="700" fill="#4A773C" font-family="'Inter',sans-serif">Open-Meteo</text>
  </g>
