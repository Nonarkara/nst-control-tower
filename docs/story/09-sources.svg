<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" font-family="'Noto Sans Thai','Sarabun','Tahoma',sans-serif">
  <title>47 แหล่งข้อมูล — แยกตามหมวด</title>
  <desc>Infographic of 47 data sources grouped into six colored category cards: air and air quality, flood and water, satellite, traffic, sea, and government and social. Each card lists source chips. A note states every source has a free plan or a fallback.</desc>

  <rect width="1200" height="640" fill="#FAF8F1"/>

  <!-- Title block -->
  <text x="56" y="64" font-size="38" font-weight="800" fill="#2C2418">47 แหล่งข้อมูล — แยกตามหมวด</text>
  <text x="58" y="96" font-size="19" fill="#9A8F80" font-family="'Inter',sans-serif">47 sources, by category.</text>
  <rect x="58" y="110" width="120" height="7" rx="3.5" fill="#F1BE48"/>

  <!-- ===== ROW 1 ===== -->

  <!-- CARD 1 — อากาศ & คุณภาพอากาศ (teal) -->
  <rect x="56" y="152" width="352" height="184" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="56" y="152" width="352" height="6" rx="3" fill="#4A773C"/>
