<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" font-family="'Noto Sans Thai','Sarabun','Tahoma',sans-serif">
  <title>ทำไมต้องมีแดชบอร์ด? — Why this exists</title>
  <desc>Infographic comparing BEFORE (scattered data across agencies — files, spreadsheet, chat, folder) and AFTER (one dashboard screen) with a bottom strip describing Yala as a southern border city facing flood, safety, and economy concerns.</desc>

  <rect width="1200" height="600" fill="#FAF8F1"/>

  <!-- Title block -->
  <text x="56" y="64" font-size="38" font-weight="800" fill="#2C2418">ทำไมต้องมีแดชบอร์ด?</text>
  <text x="58" y="96" font-size="19" fill="#9A8F80" font-family="'Inter',sans-serif">Why this exists.</text>
  <rect x="58" y="110" width="120" height="7" rx="3.5" fill="#F1BE48"/>

  <!-- ============ BEFORE CARD (red) ============ -->
  <rect x="56" y="152" width="470" height="300" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="56" y="152" width="470" height="6" rx="3" fill="#B14A2B"/>
  <circle cx="92" cy="196" r="17" fill="#F3E0D7"/>
  <text x="92" y="203" text-anchor="middle" font-size="18" font-weight="800" fill="#B14A2B">!</text>
  <text x="122" y="203" font-size="22" font-weight="800" fill="#2C2418">ก่อน · BEFORE</text>

  <!-- Row 1: stacked files / PDF -->
  <g transform="translate(80,242)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#F9EEE7"/>
    <g stroke="#B14A2B" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <path d="M11 12 h13 l5 5 v15 h-18 z" fill="#F3E0D7"/>
      <path d="M14 9 h13 l5 5 v15" />
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">เอกสาร PDF กองพะเนิน</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">Stacks of reports</text>
  </g>

  <!-- Row 2: spreadsheet -->
  <g transform="translate(80,296)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#F9EEE7"/>
    <g stroke="#B14A2B" stroke-width="2.4" fill="none" stroke-linejoin="round">
      <rect x="11" y="11" width="18" height="18" rx="2" fill="#F3E0D7"/>
      <path d="M11 17 h18 M11 23 h18 M17 11 v18" />
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">สเปรดชีตแยกไฟล์</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">Scattered spreadsheets</text>
  </g>

  <!-- Row 3: chat bubble -->
  <g transform="translate(290,242)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#F9EEE7"/>
    <g stroke="#B14A2B" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <path d="M10 11 h20 a2 2 0 0 1 2 2 v9 a2 2 0 0 1 -2 2 h-12 l-6 5 v-5 a2 2 0 0 1 -2 -2 v-9 a2 2 0 0 1 2 -2 z" fill="#F3E0D7"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">แชตไลน์กลุ่ม</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">Lost in chat threads</text>
  </g>

  <!-- Row 4: folder -->
  <g transform="translate(290,296)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#F9EEE7"/>
    <g stroke="#B14A2B" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <path d="M10 14 h7 l3 3 h10 a1 1 0 0 1 1 1 v11 a1 1 0 0 1 -1 1 h-20 a1 1 0 0 1 -1 -1 v-14 a1 1 0 0 1 1 -1 z" fill="#F3E0D7"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">โฟลเดอร์ต่างหน่วยงาน</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">Siloed folders</text>
  </g>

  <!-- subtitle strip inside BEFORE -->
  <rect x="80" y="356" width="422" height="72" rx="12" fill="#F9EEE7"/>
  <text x="100" y="386" font-size="15.5" font-weight="700" fill="#8A3A22">ข้อมูลกระจัดกระจาย หลายหน่วยงาน</text>
  <text x="100" y="412" font-size="13.5" fill="#B14A2B">กว่าจะเห็นภาพก็สาย · Too slow to act</text>

  <!-- ============ ARROW ============ -->
  <path d="M554 302 H646 m-22 -13 l22 13 l-22 13" fill="none" stroke="#C2BBAC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ============ AFTER CARD (teal) ============ -->
  <rect x="674" y="152" width="470" height="300" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="674" y="152" width="470" height="6" rx="3" fill="#4A773C"/>
  <circle cx="710" cy="196" r="17" fill="#E3EDDA"/>
  <text x="710" y="203" text-anchor="middle" font-size="19" font-weight="800" fill="#4A773C" font-family="'Inter',sans-serif">✓</text>
  <text x="740" y="203" font-size="22" font-weight="800" fill="#2C2418">หลัง · AFTER</text>

  <!-- Dashboard screen with gold ring-road -->
  <g transform="translate(714,238)">
    <!-- dark screen -->
    <rect x="0" y="0" width="240" height="142" rx="12" fill="#241B11"/>
    <rect x="0" y="0" width="240" height="142" rx="12" fill="none" stroke="#4A773C" stroke-width="2" opacity="0.5"/>
    <!-- gold ring road (the Yala motif) -->
    <ellipse cx="120" cy="74" rx="62" ry="46" fill="none" stroke="#D6A12A" stroke-width="3"/>
    <ellipse cx="120" cy="74" rx="40" ry="29" fill="none" stroke="#D6A12A" stroke-width="2" opacity="0.6"/>
    <ellipse cx="120" cy="74" rx="20" ry="14" fill="none" stroke="#D6A12A" stroke-width="2" opacity="0.4"/>
    <!-- radiating spokes -->
    <g stroke="#D6A12A" stroke-width="2" stroke-linecap="round" opacity="0.7">
      <line x1="120" y1="74" x2="120" y2="28"/>
      <line x1="120" y1="74" x2="120" y2="120"/>
      <line x1="120" y1="74" x2="58" y2="74"/>
      <line x1="120" y1="74" x2="182" y2="74"/>
      <line x1="120" y1="74" x2="76" y2="42"/>
      <line x1="120" y1="74" x2="164" y2="106"/>
    </g>
    <circle cx="120" cy="74" r="4.5" fill="#D6A12A"/>
    <!-- live data dots -->
    <circle cx="76" cy="42" r="3.5" fill="#4A773C"/>
    <circle cx="164" cy="106" r="3.5" fill="#6E4A33"/>
    <circle cx="182" cy="74" r="3.5" fill="#B14A2B"/>
    <!-- top status bar -->
    <rect x="14" y="14" width="46" height="7" rx="3.5" fill="#4A773C"/>
    <rect x="200" y="14" width="26" height="7" rx="3.5" fill="#6A5A47"/>
  </g>

  <!-- subtitle strip inside AFTER -->
  <rect x="714" y="356" width="390" height="72" rx="12" fill="#EEF3E6"/>
  <text x="734" y="386" font-size="15.5" font-weight="700" fill="#355A2C">เห็นทั้งเมืองในจอเดียว</text>
  <text x="734" y="412" font-size="13.5" fill="#4A773C">ตัดสินใจทันที · Decide in real time</text>

  <!-- ============ BOTTOM PANEL STRIP ============ -->
  <rect x="56" y="480" width="1088" height="92" rx="18" fill="#F4F1E9" stroke="#DED9CE" stroke-width="2"/>
  <text x="88" y="520" font-size="20" font-weight="800" fill="#2C2418">ยะลา = ชายแดนใต้</text>
  <text x="88" y="544" font-size="12.5" fill="#9A8F80" font-family="'Inter',sans-serif">A southern border city — every signal matters.</text>

  <!-- chip 1: flood (blue) -->
  <g transform="translate(470,498)">
    <rect x="0" y="0" width="208" height="58" rx="14" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
    <rect x="0" y="0" width="6" height="58" rx="3" fill="#6E4A33"/>
    <g transform="translate(22,17)" stroke="#6E4A33" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="22" height="22" rx="6" fill="#EBE2D9" stroke="none"/>
      <path d="M7 13 q3 -4 6 0 t6 0"/>
      <path d="M7 18 q3 -4 6 0 t6 0"/>
    </g>
    <text x="58" y="26" font-size="17" font-weight="700" fill="#2C2418">น้ำท่วม</text>
    <text x="58" y="44" font-size="12.5" fill="#9A8F80">รู้ช้าไม่ได้</text>
  </g>

  <!-- chip 2: safety (red) -->
  <g transform="translate(694,498)">
    <rect x="0" y="0" width="208" height="58" rx="14" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
    <rect x="0" y="0" width="6" height="58" rx="3" fill="#B14A2B"/>
    <g transform="translate(22,17)" stroke="#B14A2B" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="22" height="22" rx="6" fill="#F3E0D7" stroke="none"/>
      <path d="M13 6 l6 3 v5 q0 5 -6 8 q-6 -3 -6 -8 v-5 z"/>
    </g>
    <text x="58" y="26" font-size="17" font-weight="700" fill="#2C2418">ความปลอดภัย</text>
    <text x="58" y="44" font-size="12.5" fill="#9A8F80">รู้ช้าไม่ได้</text>
  </g>

  <!-- chip 3: economy (amber) -->
  <g transform="translate(918,498)">
    <rect x="0" y="0" width="208" height="58" rx="14" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
    <rect x="0" y="0" width="6" height="58" rx="3" fill="#D6A12A"/>
    <g transform="translate(22,17)" stroke="#D6A12A" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="22" height="22" rx="6" fill="#FBEFCB" stroke="none"/>
      <path d="M7 17 l4 -4 l3 3 l5 -6"/>
      <path d="M16 10 h3 v3"/>
    </g>
    <text x="58" y="26" font-size="17" font-weight="700" fill="#2C2418">เศรษฐกิจ</text>
    <text x="58" y="44" font-size="12.5" fill="#9A8F80">รู้ช้าไม่ได้</text>
  </g>
</svg>
