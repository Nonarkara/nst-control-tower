<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" font-family="'Noto Sans Thai','Sarabun','Tahoma',sans-serif">
  <title>ระบบไม่ดับ — แค่บอกตรง ๆ (Graceful degradation)</title>
  <desc>A horizontal ladder of four freshness tiers shown as colored cards: LIVE (green, just fetched), CACHE (amber, latest value still fresh), MODELLED (orange, estimated or simulated), and UNAVAILABLE (red, clear reason given). Each card has a colored dot, a Thai tier name, an English code, and a short note. The screen is never blank — every number tells how old it is.</desc>

  <rect width="1200" height="560" fill="#FAF8F1"/>

  <!-- Title block -->
  <text x="56" y="64" font-size="38" font-weight="800" fill="#2C2418">ระบบไม่ดับ — แค่บอกตรง ๆ</text>
  <text x="58" y="96" font-size="19" fill="#9A8F80" font-family="'Inter',sans-serif">Graceful degradation.</text>
  <rect x="58" y="110" width="120" height="7" rx="3.5" fill="#F1BE48"/>

  <!-- Subtitle line -->
  <text x="56" y="156" font-size="17" font-weight="700" fill="#6A5A47">จอไม่เคยว่างเปล่า — ทุกตัวเลขบอกว่าเก่าแค่ไหน</text>

  <!-- ========================= LADDER ========================= -->
  <!-- 4 cards: x = 56, 340, 624, 908  (width 264, gap 20) -->

  <!-- CARD 1 — LIVE (green) -->
  <rect x="56" y="200" width="264" height="248" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="56" y="200" width="264" height="6" rx="3" fill="#7E8A3A"/>
  <circle cx="92" cy="244" r="17" fill="#EDF0DC"/>
  <text x="92" y="251" text-anchor="middle" font-size="19" font-weight="800" fill="#7E8A3A" font-family="'Inter',sans-serif">1</text>
  <text x="122" y="251" font-size="22" font-weight="800" fill="#2C2418">สด</text>

  <!-- status dot chip -->
  <rect x="80" y="290" width="40" height="40" rx="10" fill="#EDF0DC"/>
  <circle cx="100" cy="310" r="9" fill="#7E8A3A"/>
  <circle cx="100" cy="310" r="9" fill="none" stroke="#7E8A3A" stroke-width="2.4" opacity="0.35"/>
  <text x="136" y="305" font-size="17" font-weight="700" fill="#4A3C2C" font-family="'Inter',sans-serif">LIVE</text>
  <text x="136" y="324" font-size="12.5" fill="#9A8F80">just fetched</text>

  <text x="80" y="372" font-size="17" font-weight="700" fill="#4A3C2C">เพิ่งดึงสด</text>
  <text x="80" y="404" font-size="13.5" fill="#9A8F80">ข้อมูลล่าสุดจากต้นทาง</text>
  <text x="80" y="426" font-size="13.5" fill="#9A8F80">น้อยกว่า 5 นาที</text>

  <!-- ARROW 1 -> 2 -->
  <path d="M328 324 H352 m-16 -10 l16 10 l-16 10" fill="none" stroke="#C2BBAC" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- CARD 2 — CACHE (amber) -->
  <rect x="340" y="200" width="264" height="248" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="340" y="200" width="264" height="6" rx="3" fill="#D6A12A"/>
  <circle cx="376" cy="244" r="17" fill="#FBEFCB"/>
  <text x="376" y="251" text-anchor="middle" font-size="19" font-weight="800" fill="#D6A12A" font-family="'Inter',sans-serif">2</text>
  <text x="406" y="251" font-size="22" font-weight="800" fill="#2C2418">แคช</text>

  <rect x="364" y="290" width="40" height="40" rx="10" fill="#FBEFCB"/>
  <circle cx="384" cy="310" r="9" fill="#D6A12A"/>
  <text x="420" y="305" font-size="17" font-weight="700" fill="#4A3C2C" font-family="'Inter',sans-serif">CACHE</text>
  <text x="420" y="324" font-size="12.5" fill="#9A8F80">recent value</text>

  <text x="364" y="372" font-size="17" font-weight="700" fill="#4A3C2C">ค่าล่าสุด ยังใหม่</text>
  <text x="364" y="404" font-size="13.5" fill="#9A8F80">ค่าที่เก็บไว้ก่อนหน้า</text>
  <text x="364" y="426" font-size="13.5" fill="#9A8F80">ยังเชื่อถือได้</text>

  <!-- ARROW 2 -> 3 -->
  <path d="M612 324 H636 m-16 -10 l16 10 l-16 10" fill="none" stroke="#C2BBAC" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- CARD 3 — MODELLED (orange) -->
  <rect x="624" y="200" width="264" height="248" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="624" y="200" width="264" height="6" rx="3" fill="#B14A2B"/>
  <circle cx="660" cy="244" r="17" fill="#F3E0D7"/>
  <text x="660" y="251" text-anchor="middle" font-size="19" font-weight="800" fill="#B14A2B" font-family="'Inter',sans-serif">3</text>
  <text x="690" y="251" font-size="22" font-weight="800" fill="#2C2418">จำลอง</text>

  <rect x="648" y="290" width="40" height="40" rx="10" fill="#F3E0D7"/>
  <circle cx="668" cy="310" r="9" fill="#B14A2B"/>
  <text x="704" y="305" font-size="17" font-weight="700" fill="#4A3C2C" font-family="'Inter',sans-serif">MODELLED</text>
  <text x="704" y="324" font-size="12.5" fill="#9A8F80">estimated</text>

  <text x="648" y="372" font-size="17" font-weight="700" fill="#4A3C2C">ประเมิน / จำลอง</text>
  <text x="648" y="404" font-size="13.5" fill="#9A8F80">คำนวณจากแบบจำลอง</text>
  <text x="648" y="426" font-size="13.5" fill="#9A8F80">ติดป้ายชัดว่าเป็นค่าจำลอง</text>

  <!-- ARROW 3 -> 4 -->
  <path d="M896 324 H920 m-16 -10 l16 10 l-16 10" fill="none" stroke="#C2BBAC" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- CARD 4 — UNAVAILABLE (red) -->
  <rect x="908" y="200" width="236" height="248" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="908" y="200" width="236" height="6" rx="3" fill="#B14A2B"/>
  <circle cx="944" cy="244" r="17" fill="#F3E0D7"/>
  <text x="944" y="251" text-anchor="middle" font-size="19" font-weight="800" fill="#B14A2B" font-family="'Inter',sans-serif">4</text>
  <text x="974" y="251" font-size="22" font-weight="800" fill="#2C2418">ไม่มีข้อมูล</text>

  <rect x="932" y="290" width="40" height="40" rx="10" fill="#F3E0D7"/>
  <circle cx="952" cy="310" r="9" fill="#B14A2B"/>
  <text x="988" y="305" font-size="16" font-weight="700" fill="#4A3C2C" font-family="'Inter',sans-serif">UNAVAIL.</text>
  <text x="988" y="324" font-size="12.5" fill="#9A8F80">reason shown</text>

  <text x="932" y="372" font-size="17" font-weight="700" fill="#4A3C2C">บอกเหตุผลชัด</text>
  <text x="932" y="404" font-size="13.5" fill="#9A8F80">แจ้งว่าต้นทางขัดข้อง</text>
  <text x="932" y="426" font-size="13.5" fill="#9A8F80">ไม่เดา ไม่ปล่อยว่าง</text>

  <!-- bottom promise pill -->
  <rect x="56" y="498" width="1088" height="40" rx="20" fill="#241B11"/>
  <text x="600" y="524" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF" font-family="'Inter',sans-serif">LIVE → CACHE → MODELLED → UNAVAILABLE</text>
</svg>
