<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" font-family="'Noto Sans Thai','Sarabun','Tahoma',sans-serif">
  <title>ทำเมืองของคุณได้ — Fork it for your city</title>
  <desc>A three-step infographic showing how to fork the smart-city engine: step one clone the project (teal), step two configure your city's coordinates, boundary and buildings (amber), step three deploy online (blue). A bottom row shows city pills already running on this engine: Chonburi, Yala, and your city. One engine, any city.</desc>

  <rect width="1200" height="600" fill="#FAF8F1"/>

  <!-- Title block -->
  <text x="56" y="64" font-size="38" font-weight="800" fill="#2C2418">ทำเมืองของคุณได้</text>
  <text x="58" y="96" font-size="19" fill="#9A8F80" font-family="'Inter',sans-serif">Fork it for your city.</text>
  <rect x="58" y="110" width="120" height="7" rx="3.5" fill="#F1BE48"/>

  <!-- ===================== CARD 1 — Clone (teal) ===================== -->
  <rect x="56" y="164" width="336" height="300" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="56" y="164" width="336" height="6" rx="3" fill="#4A773C"/>
  <circle cx="92" cy="208" r="17" fill="#E3EDDA"/>
  <text x="92" y="215" text-anchor="middle" font-size="19" font-weight="800" fill="#4A773C" font-family="'Inter',sans-serif">1</text>
  <text x="122" y="215" font-size="22" font-weight="800" fill="#2C2418">Clone</text>

  <!-- icon row: code/template -->
  <g transform="translate(80,266)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#EEF3E6"/>
    <g stroke="#4A773C" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="11" width="22" height="18" rx="3" fill="#E3EDDA"/>
      <path d="M16 17 l-3 3 l3 3"/>
      <path d="M24 17 l3 3 l-3 3"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">คัดลอกโครงการ</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">git clone the template repo</text>
  </g>

  <!-- supporting line -->
  <g transform="translate(80,330)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#EEF3E6"/>
    <g stroke="#4A773C" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="11" y="11" width="18" height="18" rx="3"/>
      <path d="M11 17 h18"/>
      <circle cx="15" cy="14" r="0.6" fill="#4A773C"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">โครงสร้างพร้อมใช้</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">monorepo, lenses, panels</text>
  </g>

  <text x="80" y="436" font-size="13" fill="#9A8F80" font-family="'Inter',sans-serif">React · Vite · deck.gl · MapLibre</text>

  <!-- ARROW 1→2 -->
  <path d="M404 320 H452 m-16 -10 l16 10 l-16 10" fill="none" stroke="#C2BBAC" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===================== CARD 2 — Configure (amber) ===================== -->
  <rect x="464" y="164" width="336" height="300" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="464" y="164" width="336" height="6" rx="3" fill="#D6A12A"/>
  <circle cx="500" cy="208" r="17" fill="#FBEFCB"/>
  <text x="500" y="215" text-anchor="middle" font-size="19" font-weight="800" fill="#D6A12A" font-family="'Inter',sans-serif">2</text>
  <text x="530" y="215" font-size="22" font-weight="800" fill="#2C2418">ตั้งค่าเมือง</text>

  <!-- icon row: map pin -->
  <g transform="translate(488,266)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#FDF7E6"/>
    <g stroke="#D6A12A" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 11 c-5 0 -8 3.6 -8 8 c0 5.4 8 12 8 12 c0 0 8 -6.6 8 -12 c0 -4.4 -3 -8 -8 -8 z" fill="#FBEFCB"/>
      <circle cx="20" cy="19" r="2.6"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">ใส่พิกัด/ขอบเขต</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">coordinates + boundary</text>
  </g>

  <!-- icon row: sliders -->
  <g transform="translate(488,330)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#FDF7E6"/>
    <g stroke="#D6A12A" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 15 h18 M11 25 h18"/>
      <circle cx="16" cy="15" r="2.8" fill="#FBEFCB"/>
      <circle cx="25" cy="25" r="2.8" fill="#FBEFCB"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">อาคารของเมือง</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">3D buildings + layers</text>
  </g>

  <text x="488" y="436" font-size="13" fill="#9A8F80" font-family="'Inter',sans-serif">Edit one config — no rewrite</text>

  <!-- ARROW 2→3 -->
  <path d="M812 320 H860 m-16 -10 l16 10 l-16 10" fill="none" stroke="#C2BBAC" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===================== CARD 3 — Deploy (blue) ===================== -->
  <rect x="872" y="164" width="272" height="300" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="872" y="164" width="272" height="6" rx="3" fill="#6E4A33"/>
  <circle cx="908" cy="208" r="17" fill="#EBE2D9"/>
  <text x="908" y="215" text-anchor="middle" font-size="19" font-weight="800" fill="#6E4A33" font-family="'Inter',sans-serif">3</text>
  <text x="938" y="215" font-size="22" font-weight="800" fill="#2C2418">Deploy</text>

  <!-- icon row: upload cloud -->
  <g transform="translate(896,266)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#F4EEE7"/>
    <g stroke="#6E4A33" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 25 a5 5 0 0 1 1 -9.8 a6 6 0 0 1 11.6 1 a4 4 0 0 1 0.4 8 z" fill="#EBE2D9"/>
      <path d="M20 28 v-7 M16.5 23.5 l3.5 -3.5 l3.5 3.5"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">ขึ้นออนไลน์</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">push live to the web</text>
  </g>

  <!-- icon row: globe -->
  <g transform="translate(896,330)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#F4EEE7"/>
    <g stroke="#6E4A33" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="20" cy="20" r="9" fill="#EBE2D9"/>
      <path d="M11 20 h18 M20 11 c4 4 4 14 0 18 c-4 -4 -4 -14 0 -18 z"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">เผยแพร่สาธารณะ</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">public dashboard URL</text>
  </g>

  <text x="896" y="436" font-size="13" fill="#9A8F80" font-family="'Inter',sans-serif">Live in minutes</text>

  <!-- ===================== City pills row ===================== -->
  <text x="56" y="510" font-size="14" font-weight="700" fill="#6A5A47" letter-spacing="0.5">บนเครื่องยนต์เดียวกันแล้ว · ALREADY ON THIS ENGINE</text>

  <!-- pill: Chonburi -->
  <rect x="56" y="524" width="148" height="40" rx="20" fill="#EEF3E6" stroke="#E3EDDA" stroke-width="2"/>
  <circle cx="80" cy="544" r="6" fill="#4A773C"/>
  <text x="96" y="549" font-size="16" font-weight="700" fill="#2C2418">ชลบุรี</text>

  <!-- pill: Yala -->
  <rect x="216" y="524" width="148" height="40" rx="20" fill="#FDF7E6" stroke="#FBEFCB" stroke-width="2"/>
  <circle cx="240" cy="544" r="6" fill="#D6A12A"/>
  <text x="256" y="549" font-size="16" font-weight="700" fill="#2C2418">ยะลา</text>

  <!-- pill: your city (dashed, open slot) -->
  <rect x="376" y="524" width="196" height="40" rx="20" fill="#F4F1E9" stroke="#C2BBAC" stroke-width="2" stroke-dasharray="5 5"/>
  <g stroke="#6E4A33" stroke-width="2.4" fill="none" stroke-linecap="round" transform="translate(394,538)">
    <path d="M6 0 v12 M0 6 h12"/>
  </g>
  <text x="420" y="549" font-size="16" font-weight="700" fill="#6E4A33">+ เมืองของคุณ</text>

  <!-- promise pill -->
  <rect x="640" y="524" width="504" height="40" rx="20" fill="#241B11"/>
  <text x="892" y="549" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">เครื่องยนต์เดียว เปลี่ยนเมืองได้</text>
</svg>
