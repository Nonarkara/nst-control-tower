<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" font-family="'Noto Sans Thai','Sarabun','Tahoma',sans-serif">
  <title>เชื่อใจได้ ตรวจสอบได้ — Trust and transparency</title>
  <desc>Three cards explaining trust: public data with secrets kept in env, open source code, and traceability of every number to a real source. A bottom pill reads transparent, no black box.</desc>
  <rect width="1200" height="560" fill="#FAF8F1"/>

  <!-- Title block -->
  <text x="56" y="64" font-size="38" font-weight="800" fill="#2C2418">เชื่อใจได้ ตรวจสอบได้</text>
  <text x="58" y="96" font-size="19" fill="#9A8F80" font-family="'Inter',sans-serif">Trust &amp; transparency.</text>
  <rect x="58" y="110" width="120" height="7" rx="3.5" fill="#F1BE48"/>

  <!-- ============ CARD 1 — SHIELD (teal) ============ -->
  <rect x="56" y="152" width="336" height="332" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="56" y="152" width="336" height="6" rx="3" fill="#4A773C"/>
  <circle cx="92" cy="196" r="17" fill="#E3EDDA"/>
  <text x="92" y="203" text-anchor="middle" font-size="19" font-weight="800" fill="#4A773C" font-family="'Inter',sans-serif">1</text>
  <text x="122" y="203" font-size="22" font-weight="800" fill="#2C2418">ข้อมูลสาธารณะ</text>

  <!-- big shield icon -->
  <g transform="translate(170,232)" stroke="#4A773C" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M27 2 L50 11 V30 C50 44 40 51 27 56 C14 51 4 44 4 30 V11 Z" fill="#EEF3E6"/>
    <path d="M16 28 l8 8 l16 -17"/>
  </g>

  <!-- icon row a -->
  <g transform="translate(80,322)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#EEF3E6"/>
    <g stroke="#4A773C" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <rect x="11" y="13" width="18" height="16" rx="2" fill="#E3EDDA"/>
      <circle cx="20" cy="21" r="2.4" fill="#4A773C" stroke="none"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">ไม่มีความลับในโค้ด</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">No secrets in the source</text>
  </g>

  <!-- icon row b -->
  <g transform="translate(80,388)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#EEF3E6"/>
    <g stroke="#4A773C" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <rect x="10" y="18" width="20" height="13" rx="2" fill="#E3EDDA"/>
      <path d="M14 18 v-3 a6 6 0 0 1 12 0 v3"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">คีย์อยู่ใน env</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">Keys live in env vars</text>
  </g>

  <!-- arrow 1 -> 2 -->
  <path d="M404 338 H476 m-16 -10 l16 10 l-16 10" fill="none" stroke="#C2BBAC" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ============ CARD 2 — OPEN SOURCE (violet) ============ -->
  <rect x="492" y="152" width="336" height="332" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="492" y="152" width="336" height="6" rx="3" fill="#2F6B5A"/>
  <circle cx="528" cy="196" r="17" fill="#DCE8E2"/>
  <text x="528" y="203" text-anchor="middle" font-size="19" font-weight="800" fill="#2F6B5A" font-family="'Inter',sans-serif">2</text>
  <text x="558" y="203" font-size="22" font-weight="800" fill="#2C2418">โอเพนซอร์ส</text>

  <!-- big code-brackets + open lock icon -->
  <g transform="translate(602,232)" stroke="#2F6B5A" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <rect x="12" y="6" width="52" height="44" rx="6" fill="#EEF3F0"/>
    <path d="M30 20 l-8 8 l8 8"/>
    <path d="M46 20 l8 8 l-8 8"/>
  </g>

  <!-- icon row a -->
  <g transform="translate(516,322)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#EEF3F0"/>
    <g stroke="#2F6B5A" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <path d="M11 13 h18 v14 h-13 l-5 5 Z" fill="#DCE8E2"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">เปิดอ่าน เปิดแก้</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">Read it, fork it</text>
  </g>

  <!-- icon row b -->
  <g transform="translate(516,388)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#EEF3F0"/>
    <g stroke="#2F6B5A" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <rect x="11" y="18" width="18" height="13" rx="2" fill="#DCE8E2"/>
      <path d="M15 18 v-3 a6 6 0 0 1 11 -2"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">เปิดตรวจ</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">Anyone can audit</text>
  </g>

  <!-- arrow 2 -> 3 -->
  <path d="M840 338 H912 m-16 -10 l16 10 l-16 10" fill="none" stroke="#C2BBAC" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ============ CARD 3 — TRACEABLE (blue) ============ -->
  <rect x="828" y="152" width="316" height="332" rx="18" fill="#FFFFFF" stroke="#DED9CE" stroke-width="2"/>
  <rect x="828" y="152" width="316" height="6" rx="3" fill="#6E4A33"/>
  <circle cx="864" cy="196" r="17" fill="#EBE2D9"/>
  <text x="864" y="203" text-anchor="middle" font-size="19" font-weight="800" fill="#6E4A33" font-family="'Inter',sans-serif">3</text>
  <text x="894" y="203" font-size="22" font-weight="800" fill="#2C2418">ตรวจสอบย้อนกลับ</text>

  <!-- big magnifier-on-document icon -->
  <g transform="translate(936,230)" stroke="#6E4A33" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M10 4 h34 l14 14 v40 a2 2 0 0 1 -2 2 H10 a2 2 0 0 1 -2 -2 V6 a2 2 0 0 1 2 -2 Z" fill="#F4EEE7"/>
    <path d="M44 4 v14 h14"/>
    <circle cx="32" cy="38" r="11" fill="#EBE2D9"/>
    <path d="M40 46 l8 8"/>
  </g>

  <!-- icon row a -->
  <g transform="translate(852,322)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#F4EEE7"/>
    <g stroke="#6E4A33" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <circle cx="18" cy="18" r="7" fill="#EBE2D9"/>
      <path d="M23 23 l7 7"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">ทุกตัวเลข</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">Every figure</text>
  </g>

  <!-- icon row b -->
  <g transform="translate(852,388)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#F4EEE7"/>
    <g stroke="#6E4A33" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <rect x="10" y="11" width="20" height="18" rx="2" fill="#EBE2D9"/>
      <path d="M14 17 h12 M14 21 h12 M14 25 h8"/>
    </g>
    <text x="52" y="19" font-size="17" font-weight="700" fill="#4A3C2C">มาจากแหล่งจริง</text>
    <text x="52" y="37" font-size="12.5" fill="#9A8F80">From a real source</text>
  </g>

  <!-- bottom promise pill -->
  <rect x="56" y="510" width="1088" height="34" rx="17" fill="#241B11"/>
  <text x="600" y="533" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">โปร่งใส · ไม่มีกล่องดำ</text>
</svg>
