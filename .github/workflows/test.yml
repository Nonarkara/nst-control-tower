name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (shared)
        run: pnpm --filter @nst/shared typecheck

      - name: Typecheck (web)
        run: pnpm --filter @nst/web typecheck

      - name: Typecheck (api)
        run: pnpm --filter @nst/api typecheck

      - name: Unit tests (shared)
        run: pnpm --filter @nst/shared test

      - name: Unit tests (web)
        run: pnpm --filter @nst/web test

      - name: Unit tests (api)
        run: pnpm --filter @nst/api test

  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @nst/web exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: pnpm --filter @nst/web test:e2e
        env:
          CI: "1"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
